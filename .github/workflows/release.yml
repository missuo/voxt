name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v1.2.0)"
        required: true
        type: string
      min_supported_version:
        description: "Minimum supported app version for in-app update"
        required: false
        type: string
      release_notes:
        description: "Release notes text for appcast.json"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
            NOTES="See CHANGELOG.md for details."
          else
            TAG="${{ inputs.tag }}"
            NOTES="${{ inputs.release_notes }}"
          fi

          VERSION="${TAG#v}"
          if [[ -z "${VERSION}" || "${VERSION}" == "${TAG}" ]]; then
            echo "Tag must start with v, got: ${TAG}" >&2
            exit 1
          fi

          if [[ -n "${{ inputs.min_supported_version }}" ]]; then
            MIN_SUPPORTED="${{ inputs.min_supported_version }}"
          else
            MIN_SUPPORTED="${VERSION}"
          fi

          if [[ -z "${NOTES}" ]]; then
            NOTES="See CHANGELOG.md for details."
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "min_supported=${MIN_SUPPORTED}" >> "$GITHUB_OUTPUT"
          echo "notes=${NOTES}" >> "$GITHUB_OUTPUT"

      - name: Build release artifacts
        shell: bash
        run: |
          chmod +x scripts/release/build_pkg.sh
          scripts/release/build_pkg.sh "${{ steps.meta.outputs.version }}" build/release

      - name: Generate appcast.json
        shell: bash
        run: |
          PKG_PATH="build/release/Voxt-${{ steps.meta.outputs.version }}.pkg"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}/Voxt-${{ steps.meta.outputs.version }}.pkg"
          chmod +x scripts/release/generate_appcast.sh
          scripts/release/generate_appcast.sh \
            "${{ steps.meta.outputs.version }}" \
            "${PKG_PATH}" \
            "${DOWNLOAD_URL}" \
            "${{ steps.meta.outputs.min_supported }}" \
            "${{ steps.meta.outputs.notes }}" \
            "build/release/appcast.json"

      - name: Ensure release exists (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if gh release view "${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            echo "Release already exists"
          else
            gh release create "${{ steps.meta.outputs.tag }}" \
              --title "${{ steps.meta.outputs.tag }}" \
              --notes "Automated release for ${{ steps.meta.outputs.tag }}"
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ steps.meta.outputs.tag }}" \
            "build/release/Voxt-${{ steps.meta.outputs.version }}.pkg" \
            "build/release/Voxt-${{ steps.meta.outputs.version }}-macOS.zip" \
            "build/release/appcast.json#appcast.json" \
            --clobber

      - name: Commit and push appcast.json
        shell: bash
        run: |
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          git fetch origin "${DEFAULT_BRANCH}"
          git checkout -B "${DEFAULT_BRANCH}" "origin/${DEFAULT_BRANCH}"
          cp build/release/appcast.json updates/appcast.json

          if git diff --quiet -- updates/appcast.json; then
            echo "No appcast changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add updates/appcast.json
          git commit -m "chore(release): update appcast for ${{ steps.meta.outputs.tag }}"
          git push origin "HEAD:${DEFAULT_BRANCH}"
